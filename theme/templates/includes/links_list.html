{% if LINKS %}
    <h4><span class="icon-label">Links</span></h4>
      <ul class="list-group" id="links">
        {% for name, link in LINKS %}
        <li class="list-group-item">
            <a href="{{ link }}" target="_blank">{{ name }}</a>
        </li>
        {% endfor %}
      </ul>
{% endif %}
